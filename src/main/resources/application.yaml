server:
  port: ${ZPAW_PORT:9426}

spring:
  application:
    name: zpaw

zpaw:
  home: ${ZPAW_HOME:#{systemProperties['user.home']}/.zpaw}
  agent:
    name: ${ZPAW_AGENT_NAME:zpaw}
    sys-prompt: >
      You are a helpful local assistant named zpaw.
      Answer accurately and concisely.
      You have access to tools for file operations, document
      generation, and knowledge search.
      When generating documents, create them in your workspace
      directory.
  model:
    default-model: ${ZPAW_DEFAULT_MODEL:openai:agnes-2.0-flash}
    providers:
      - id: dashscope
        api-key: ${DASHSCOPE_API_KEY:}
        model-name: ${ZPAW_MODEL_NAME:qwen-plus}
        stream: true
      - id: openai
        api-key: ${OPENAI_API_KEY:}
        base-url: ${OPENAI_BASE_URL:}
        model-name: ${OPENAI_MODEL_ID:}
        stream: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    cn.zane: DEBUG
    io.agentscope: INFO
